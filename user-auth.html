<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login / Signup | FF Weddingz</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Allura&family=Cormorant+Garamond:wght@500;600;700&family=Great+Vibes&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Main CSS -->
  <link rel="stylesheet" href="css/style.css">

  <style>
    /* ===== RESET ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body.user-auth-page {
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
    }

    /* ===== BACKGROUND ===== */
    .login-section {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px 20px;
      background: #3d2010;
      overflow: hidden;
    }

    .login-bg-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      opacity: 0.55;
    }

    .login-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(60, 30, 10, 0.75), rgba(120, 65, 30, 0.65));
      z-index: 1;
    }

    /* ===== CARD ===== */
    .luxury-login-card {
      position: relative;
      z-index: 2;
      width: 900px;
      min-height: 480px;
      display: grid;
      grid-template-columns: 1fr 1.25fr;
      border-radius: 30px;
      background: rgba(240, 215, 195, 0.42);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 230, 200, 0.45);
      box-shadow: 0 30px 80px rgba(40, 15, 5, 0.55);
      overflow: hidden;
    }

    /* ===== LEFT IMAGE ===== */
    .login-art {
      height: 100%;
    }

    .login-art img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ===== RIGHT FORM PANEL ===== */
    .login-form-side {
      padding: 45px 50px;
      display: flex;
      flex-direction: column;
    }

    .login-form-side h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 68px;
      color: #c89a65;
      line-height: 1;
      margin-bottom: 6px;
      text-shadow: 0 4px 15px rgba(180, 120, 50, 0.4);
    }

    /* ===== TABS ===== */
    .auth-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 28px;
    }

    .auth-tabs button {
      flex: 1;
      padding: 10px 6px;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      font-size: 13px;
      font-weight: 600;
      background: rgba(255, 255, 255, 0.22);
      color: #7b4a32;
      transition: all 0.3s;
      letter-spacing: 0.3px;
    }

    .auth-tabs button:hover {
      background: rgba(255, 255, 255, 0.38);
    }

    .auth-tabs button.active {
      background: linear-gradient(135deg, #f3d6bd, #c4936e, #805033);
      color: white;
      box-shadow: 0 6px 18px rgba(100, 50, 20, 0.3);
    }

    /* ===== FORMS ===== */
    .auth-form {
      display: none;
      flex-direction: column;
      flex: 1;
    }

    .auth-form.active-form {
      display: flex;
    }

    .form-group {
      position: relative;
      margin-bottom: 22px;
    }

    .form-group input {
      width: 100%;
      padding: 13px 8px 10px 8px;
      background: transparent;
      border: none;
      border-bottom: 2px solid rgba(120, 70, 40, 0.45);
      outline: none;
      font-family: 'Poppins', sans-serif;
      font-size: 15px;
      color: #5c3215;
      transition: border-color 0.3s;
    }

    .form-group input:focus {
      border-bottom-color: #c4936e;
    }

    .form-group input::placeholder {
      color: #9a6040;
      font-size: 14px;
    }

    /* ===== SUBMIT BUTTON ===== */
    .auth-submit-btn {
      width: 100%;
      padding: 14px;
      margin-top: 8px;
      border: none;
      border-radius: 30px;
      background: linear-gradient(135deg, #f3d6bd, #c4936e, #805033);
      color: #4b2a10;
      font-family: 'Poppins', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      box-shadow: 0 8px 22px rgba(100, 50, 20, 0.3);
      transition: all 0.3s;
    }

    .auth-submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(100, 50, 20, 0.4);
    }

    .auth-submit-btn:active {
      transform: translateY(0);
    }

    /* ===== BOTTOM LINKS ===== */
    .auth-bottom-links {
      display: flex;
      justify-content: space-between;
      margin-top: 18px;
      font-size: 13px;
      color: #9a6040;
    }

    .auth-bottom-links span {
      cursor: pointer;
      transition: color 0.2s;
    }

    .auth-bottom-links span:hover {
      color: #c4936e;
      text-decoration: underline;
    }

    /* ===== ADMIN FORM HEADING ===== */
    .admin-form-heading {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px;
      font-weight: 600;
      color: #7b4a32;
      margin-bottom: 18px;
      letter-spacing: 0.5px;
    }

    /* ===== BACK TO HOME LINK ===== */
    .back-home-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: #9a6040;
      text-decoration: none;
      transition: color 0.2s;
    }

    .back-home-link:hover {
      color: #c4936e;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .luxury-login-card {
        grid-template-columns: 1fr;
        width: 100%;
        max-width: 420px;
        min-height: auto;
      }

      .login-art { height: 200px; }

      .login-form-side {
        padding: 30px 28px;
      }

      .login-form-side h1 { font-size: 50px; }

      .auth-tabs { flex-wrap: wrap; }

      .auth-tabs button {
        font-size: 12px;
        padding: 9px 4px;
      }
    }
  </style>
</head>
<body class="user-auth-page">

<section class="login-section">

  <!-- Background Video -->
  <video autoplay muted loop playsinline class="login-bg-video">
    <source src="videos/login-bg.mp4" type="video/mp4">
  </video>

  <!-- Overlay -->
  <div class="login-overlay"></div>

  <!-- Card -->
  <div class="luxury-login-card">

    <!-- Left: Art Image -->
    <div class="login-art">
      <img src="images/login-art.jpeg" alt="FF Weddingz">
    </div>

    <!-- Right: Forms -->
    <div class="login-form-side">

      <h1>FF Weddingz</h1>

      <!-- Tab Buttons -->
      <div class="auth-tabs">
        <button type="button" id="loginTab" class="active">User Login</button>
        <button type="button" id="signupTab">Signup</button>
        <button type="button" id="adminTab">Admin</button>
      </div>

      <!-- ===== USER LOGIN FORM ===== -->
      <form id="loginForm" class="auth-form active-form" novalidate>
        <div class="form-group">
          <input type="email" id="loginEmail" placeholder="Email Address" required autocomplete="email">
        </div>
        <div class="form-group">
          <input type="password" id="loginPassword" placeholder="Password" required autocomplete="current-password">
        </div>
        <button type="submit" class="auth-submit-btn">Login</button>
        <div class="auth-bottom-links">
          <span id="showSignupLink">Create an account</span>
          <span id="forgotPassword">Forgot password?</span>
        </div>
      </form>

      <!-- ===== SIGNUP FORM ===== -->
      <form id="signupForm" class="auth-form" novalidate>
        <div class="form-group">
          <input type="text" id="signupName" placeholder="Full Name" required autocomplete="name">
        </div>
        <div class="form-group">
          <input type="email" id="signupEmail" placeholder="Email Address" required autocomplete="email">
        </div>
        <div class="form-group">
          <input type="password" id="signupPassword" placeholder="Password (min 6 chars)" required autocomplete="new-password">
        </div>
        <button type="submit" class="auth-submit-btn">Create Account</button>
        <div class="auth-bottom-links">
          <span id="showLoginLink">Already have an account?</span>
          <span id="forgotPasswordSignup">Forgot password?</span>
        </div>
      </form>

      <!-- ===== ADMIN LOGIN FORM ===== -->
      <form id="adminForm" class="auth-form" novalidate>
        <p class="admin-form-heading">Admin Dashboard Access</p>
        <div class="form-group">
          <input type="text" id="adminUsername" placeholder="Admin Username" required autocomplete="username">
        </div>
        <div class="form-group">
          <input type="password" id="adminPassword" placeholder="Admin Password" required autocomplete="current-password">
        </div>
        <button type="submit" class="auth-submit-btn">Login as Admin</button>
        <div class="auth-bottom-links">
          <span id="showUserLoginLink">← Back to user login</span>
          <span>Admin only access</span>
        </div>
      </form>

      <!-- Back to website -->
      <a href="index.html" class="back-home-link">← Back to Website</a>

    </div>
  </div>

</section>

<script src="js/auth.js"></script>
</body>
</html>
